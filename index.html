<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Science+Gothic:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Touch Typing Trainer</title>
  </head>
  <body>
    <div class="main">
      <div class="name">Тренажер слепой печати</div>
      <div class="counters">
        <div class="counter">Время<span id="timer">0:00.0</span></div>
        <div class="counter">Скорость<span id="speed">0 зн/мин</span></div>
        <div class="counter">Ошибки<span id="mistakes">0</span></div>
        <div class="counter">Точность<span id="accuracy">100.00%</span></div>
      </div>
      <div class="board board--start">Здесь будет текст. Жми "Начать"</div>
      <button class="button" id="main-button">Начать</button>
      <script src="./script.js"></script>
    </div>
  </body>
</html>
