<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Science+Gothic:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Touch Typing Trainer</title>
  </head>
  <body>
    <div class="main">
      <div class="name">Тренажер слепой печати</div>
      <div class="counters">
        <div class="counter">Время<span>0:00.0</span></div>
        <div class="counter">Скорость<span>0 зн/мин</span></div>
        <div class="counter">Ошибки<span>0</span></div>
        <div class="counter">Точность<span>100%</span></div>
      </div>
      <div class="board"></div>
      <button class="reset">Перезапуск</button>
      <script src="./script.js"></script>
    </div>
  </body>
</html>
